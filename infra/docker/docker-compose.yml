version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sms-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sms_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sms-network

  redis:
    image: redis:7-alpine
    container_name: sms-redis
    ports:
      - "6379:6379"
    networks:
      - sms-network

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: sms-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/sms_saas
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - sms-network

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: sms-worker
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    networks:
      - sms-network

  router:
    build:
      context: .
      dockerfile: services/router/Dockerfile
    container_name: sms-router
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    networks:
      - sms-network

networks:
  sms-network:
    driver: bridge

volumes:
  postgres_data:
